<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beerio Kart Redemption</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <h1>Beerio Kart Redemption</h1>
    <p>Win/loss tournament bracket.</p>
  </header>

  <main class="app">
    <section id="join-screen" class="panel join-screen" aria-label="Join lobby">
      <h2>Join Lobby</h2>
      <p class="join-intro">Enter your name to join this tournament room.</p>
      <div class="join-panel">
        <label for="join-name">Player Name</label>
        <div class="join-row">
          <input id="join-name" type="text" maxlength="32" placeholder="Enter your name" />
          <button id="join-lobby" type="button">Join</button>
        </div>
        <div id="join-status" class="join-status"></div>
      </div>
      <div id="join-count" class="join-count"></div>
    </section>

    <section id="toolbar" class="toolbar panel" aria-label="Tournament controls">
      <div class="toolbar-head">
        <button
          id="toolbar-toggle"
          class="toolbar-toggle"
          type="button"
          aria-expanded="true"
          aria-controls="toolbar-content"
        >
          Hide Controls
        </button>
      </div>
      <div id="toolbar-content" class="toolbar-content">
        <div class="admin-auth" aria-label="Admin access">
          <label for="admin-password">Admin</label>
          <input id="admin-password" type="password" placeholder="Password" />
          <button id="admin-login" type="button">Unlock</button>
          <button id="admin-logout" class="hidden" type="button">Lock</button>
          <span id="admin-status" class="admin-status">Viewer mode</span>
        </div>
        <div id="settings-panel" class="settings admin-only">
          <label for="elimination-mode">Format</label>
          <select id="elimination-mode">
            <option value="single">Single Elimination</option>
            <option value="double">Double Elimination</option>
          </select>
          <button id="update-bracket" class="primary" type="button">Update Format</button>
        </div>
        <div class="settings">
          <button id="reset-tournament" type="button">Reset Tournament</button>
        </div>
        <div class="sync-controls" aria-label="Shared bracket sync status">
          <span id="sync-status" class="sync-status">Cloud sync: local only</span>
        </div>
        <div id="meta" class="meta"></div>
      </div>
    </section>

    <section id="lobby-panel" class="panel lobby-panel" aria-label="Lobby">
      <div class="lobby-head">
        <h2>Lobby</h2>
        <button id="start-tournament" class="primary admin-only" type="button">Seed Players and Begin Tournament</button>
      </div>

      <div class="lobby-roster-wrap" aria-label="Lobby roster">
        <h3 class="lobby-roster-title">Roster</h3>
        <ol id="lobby-roster" class="lobby-roster"></ol>
      </div>

      <div class="admin-only lobby-admin-editor">
        <label for="lobby-players">Admin Lobby Override (one per line)</label>
        <textarea id="lobby-players" rows="5" placeholder="Mario&#10;Luigi&#10;Peach"></textarea>
      </div>
      <div id="lobby-status" class="lobby-status"></div>
    </section>

    <section id="bracket-shell" class="panel bracket-shell" aria-label="Tournament bracket">
      <div id="empty" class="empty-state">Bracket appears here after the admin seeds players and starts the tournament.</div>

      <div id="bracket-viewport" class="bracket-viewport hidden">
        <div id="bracket-canvas" class="bracket-canvas">
          <div id="bracket" class="bracket">
            <div id="left-side" class="side" aria-label="Left side bracket"></div>
            <div id="final-side" class="final-side" aria-label="Final round"></div>
            <div id="right-side" class="side" aria-label="Right side bracket"></div>
            <div id="losers-side" class="losers-side hidden" aria-label="Losers bracket"></div>
          </div>
        </div>
      </div>

      <div id="mobile-bracket" class="mobile-bracket hidden" aria-label="Mobile tournament bracket"></div>

      <div id="champion" class="champion hidden" aria-live="polite"></div>
    </section>
  </main>

  <template id="match-template">
    <article class="match">
      <header class="match-head"></header>

      <div class="competitor" data-slot="0">
        <span class="seed-tag hidden"></span>
        <input class="name-input hidden" type="text" maxlength="32" placeholder="Enter name" />
        <span class="name-label"></span>
        <button class="win-btn" type="button">Win</button>
      </div>

      <div class="competitor" data-slot="1">
        <span class="seed-tag hidden"></span>
        <input class="name-input hidden" type="text" maxlength="32" placeholder="Enter name" />
        <span class="name-label"></span>
        <button class="win-btn" type="button">Win</button>
      </div>

      <footer class="match-foot">
        <span class="status"></span>
      </footer>
    </article>
  </template>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
